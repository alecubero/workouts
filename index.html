<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Entrenamiento · Alejandra</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --accent: #2D4A3E;
    --accent-light: #E8F0ED;
    --accent-mid: #6B9E87;
    --text: #1A1A1A;
    --muted: #7A7870;
    --border: #E2DED6;
    --day1: #C8DED6;
    --day2: #D6C8DE;
    --day3: #DED6C8;
    --day4: #C8D4DE;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  .gcal-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--accent-light);
    font-size: 18px;
    text-decoration: none;
    flex-shrink: 0;
    transition: background 0.2s;
  }

  @media (hover: hover) and (pointer: fine) {
    .gcal-btn:hover { background: #d0e4db; }
  }

  .month-nav {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 16px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }

  .month-nav::-webkit-scrollbar { display: none; }

  .month-btn {
    flex-shrink: 0;
    padding: 7px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .month-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    font-weight: 500;
  }

  .month-view { display: none; }
  .month-view.active { display: block; }

  .month-header {
    padding: 20px 20px 8px;
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .month-header h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--text);
  }

  .month-header span {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .circuits-list { padding: 8px 20px 32px; }

  .circuit-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: box-shadow 0.2s;
  }

  .circuit-card:active { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }

  .circuit-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .day-dot {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .day-dot .num {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    line-height: 1;
    color: var(--accent);
  }

  .day-dot .lbl {
    font-size: 9px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    opacity: 0.7;
  }

  .d1 { background: var(--day1); }
  .d2 { background: var(--day2); }
  .d3 { background: var(--day3); }
  .d4 { background: var(--day4); }

  .circuit-info { flex: 1; min-width: 0; }

  .circuit-info h3 {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .circuit-info p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .chevron-icon {
    font-size: 12px;
    color: var(--muted);
    transition: transform 0.25s;
    flex-shrink: 0;
  }

  .chevron-icon.open { transform: rotate(180deg); }

  .circuit-body {
    display: none;
    border-top: 1px solid var(--border);
  }

  .circuit-body.open { display: block; }

  .warmup-bar {
    background: var(--accent-light);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--accent);
    font-weight: 500;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    background: #F9F8F5;
    padding: 8px 12px;
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-align: left;
    border-bottom: 1px solid var(--border);
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
  }

  tbody tr:last-child { border-bottom: none; }

  tbody td {
    padding: 12px;
    font-size: 13px;
    vertical-align: top;
    color: var(--text);
    line-height: 1.45;
  }

  .rep-badge {
    display: inline-block;
    background: #F2EFE8;
    color: #5A5248;
    font-size: 12px;
    padding: 3px 8px;
    border-radius: 6px;
    font-weight: 500;
    white-space: nowrap;
  }

  .obs-text {
    font-size: 11.5px;
    color: var(--muted);
    margin-top: 3px;
    font-style: italic;
  }

  .circuit-round-note {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    background: #F2F7F4;
    font-size: 12px;
    color: var(--accent);
    border-bottom: 1px solid var(--border);
  }

  .loading-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 14px;
  }

  .error-state {
    text-align: center;
    padding: 60px 20px;
    color: #c0392b;
    font-size: 14px;
  }

  /* Floating timer */
  .timer-fab {
    position: fixed;
    bottom: 24px;
    right: 20px;
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    border: none;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    transition: background 0.2s;
    z-index: 100;
  }

  .timer-fab.running { background: #1a2e26; }
  .timer-fab.done    { background: #b85c38; }

  .timer-fab .timer-time {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    line-height: 1;
  }

  .timer-fab .timer-label {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    opacity: 0.75;
    margin-top: 2px;
  }

  /* Extra bottom padding so last card isn't hidden behind the FAB */
  #mainContent { padding-bottom: 100px; }
</style>
</head>
<body>

<nav class="month-nav" id="monthNav">
  <div class="loading-state">Cargando…</div>
</nav>

<main id="mainContent"></main>

<button class="timer-fab" id="timerFab" aria-label="Cronómetro de descanso">
  <span class="timer-time" id="timerDisplay">1:00</span>
  <span class="timer-label" id="timerLabel">descanso</span>
</button>

<script>
  const dotColors = ['d1', 'd2', 'd3', 'd4'];

  function buildGcalUrl(circuito, mesNombre) {
    const now   = new Date();
    const ymd   = now.toISOString().slice(0, 10).replace(/-/g, '');
    const next  = new Date(now); next.setDate(now.getDate() + 1);
    const ymd1  = next.toISOString().slice(0, 10).replace(/-/g, '');

    const params = new URLSearchParams({
      action: 'TEMPLATE',
      text:   `🏋️‍♀️ Circuito ${circuito.dia}`,
      dates:  `${ymd}/${ymd1}`,
    });
    return `https://calendar.google.com/calendar/render?${params.toString()}`;
  }

  async function loadData() {
    const nav  = document.getElementById('monthNav');
    const main = document.getElementById('mainContent');

    let payload;
    try {
      const res = await fetch('./data.json');
      if (!res.ok) throw new Error(res.status);
      payload = await res.json();
    } catch (err) {
      nav.innerHTML  = '';
      main.innerHTML = `<div class="error-state">Error al cargar los datos. Inténtalo de nuevo.</div>`;
      console.error(err);
      return;
    }

    nav.innerHTML  = '';
    main.innerHTML = '';

    payload.meses.forEach((mes, mi) => {
      const btn = document.createElement('button');
      btn.className = 'month-btn' + (mi === 0 ? ' active' : '');
      btn.textContent = mes.nombre;
      btn.onclick = () => {
        document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.month-view').forEach(v => v.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('mv-' + mes.id).classList.add('active');
      };
      nav.appendChild(btn);

      const view = document.createElement('div');
      view.className = 'month-view' + (mi === 0 ? ' active' : '');
      view.id = 'mv-' + mes.id;

      let html = `
        <div class="month-header">
          <h2>${mes.nombre}</h2>
          <span>${mes.circuitos.length} días</span>
        </div>
        <div class="circuits-list">`;

      mes.circuitos.forEach((c, ci) => {
        const dc = dotColors[ci % 4];
        const gcalUrl = buildGcalUrl(c, mes.nombre);
        html += `
        <div class="circuit-card">
          <div class="circuit-header" onclick="toggleCircuit(this)">
            <div class="day-dot ${dc}">
              <span class="num">${c.dia}</span>
              <span class="lbl">Día</span>
            </div>
            <div class="circuit-info">
              <h3>${c.label}</h3>
              <p>${c.sub || ''}</p>
            </div>
            <a class="gcal-btn" href="${gcalUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()" aria-label="Añadir al calendario">📅</a>
            <span class="chevron-icon">▼</span>
          </div>
          <div class="circuit-body">
            <div class="warmup-bar">🚴 Calentamiento — ${c.calentamiento || 'Elíptica 10 min'}</div>
            ${c.nota ? `<div class="circuit-round-note">🔄 <strong>${c.nota}</strong> — realizar los ejercicios en circuito</div>` : ''}
            <table>
              <thead>
                <tr>
                  <th>Ejercicio</th>
                  <th>Series/Reps</th>
                  <th>Desc.</th>
                </tr>
              </thead>
              <tbody>
                ${c.ejercicios.map(e => `
                <tr>
                  <td>
                    <div>${e.nombre}</div>
                    ${e.obs ? `<div class="obs-text">${e.obs}</div>` : ''}
                  </td>
                  <td><span class="rep-badge">${e.reps || ''}</span></td>
                  <td style="color:var(--muted);font-size:12px;">${e.descanso || ''}</td>
                </tr>`).join('')}
              </tbody>
            </table>
          </div>
        </div>`;
      });

      html += '</div>';
      view.innerHTML = html;
      main.appendChild(view);
    });
  }

  window.toggleCircuit = function(header) {
    const body    = header.nextElementSibling;
    const chevron = header.querySelector('.chevron-icon');
    const isOpen  = body.classList.contains('open');
    body.classList.toggle('open', !isOpen);
    chevron.classList.toggle('open', !isOpen);
  };

  loadData();

  // --- Countdown timer ---
  const DURATION = 60;
  let remaining  = DURATION;
  let intervalId = null;

  const fab     = document.getElementById('timerFab');
  const display = document.getElementById('timerDisplay');
  const label   = document.getElementById('timerLabel');

  function fmt(s) {
    return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
  }

  function beep() {
    try {
      const ctx  = new (window.AudioContext || window.webkitAudioContext)();
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.4, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.6);
    } catch (_) {}
  }

  function stopTimer() {
    clearInterval(intervalId);
    intervalId = null;
  }

  function resetTimer() {
    stopTimer();
    remaining = DURATION;
    display.textContent = fmt(remaining);
    label.textContent   = 'descanso';
    fab.classList.remove('running', 'done');
  }

  fab.addEventListener('click', () => {
    if (intervalId) {
      // Running → reset
      resetTimer();
      return;
    }
    if (remaining === 0) {
      // Done → reset and start
      resetTimer();
    }
    // Start
    fab.classList.add('running');
    fab.classList.remove('done');
    label.textContent = 'toca para reiniciar';
    if (navigator.vibrate) navigator.vibrate(40);

    intervalId = setInterval(() => {
      remaining--;
      display.textContent = fmt(remaining);
      if (remaining === 0) {
        stopTimer();
        fab.classList.remove('running');
        fab.classList.add('done');
        label.textContent = '¡listo!';
        beep();
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      }
    }, 1000);
  });
</script>

</body>
</html>
